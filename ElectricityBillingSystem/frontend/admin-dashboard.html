<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Electricity Billing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <h1>Admin Dashboard</h1>
        <button onclick="logout()" class="btn-secondary">Logout</button>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('customers')">Manage Customers</button>
            <button class="tab-btn" onclick="showTab('bills')">Manage Bills</button>
            <button class="tab-btn" onclick="showTab('viewBills')">View All Bills</button>
        </div>

        <!-- Customers Tab -->
        <div id="customers" class="tab-content active">
            <h2>Add New Customer</h2>
            <form id="addCustomerForm" class="form-inline">
                <input type="text" id="customerId" placeholder="Customer ID" required>
                <input type="text" id="customerName" placeholder="Name" required>
                <input type="email" id="customerEmail" placeholder="Email" required>
                <input type="text" id="customerAddress" placeholder="Address" required>
                <input type="text" id="customerPhone" placeholder="Phone" required>
                <button type="submit" class="btn-primary">Add Customer</button>
            </form>

            <h2>All Customers</h2>
            <div id="customersList"></div>
        </div>

        <!-- Bills Tab -->
        <div id="bills" class="tab-content">
            <h2>Generate Monthly Bill</h2>
            <form id="generateBillForm" class="form-inline">
                <input type="text" id="billCustomerId" placeholder="Customer ID" required>
                <input type="number" id="unitsConsumed" placeholder="Units Consumed" required>
                <input type="number" step="0.01" id="ratePerUnit" placeholder="Rate per Unit" value="8.50" required>
                <input type="month" id="billMonth" required>
                <button type="submit" class="btn-primary">Generate Bill</button>
            </form>
        </div>

        <!-- View Bills Tab -->
        <div id="viewBills" class="tab-content">
            <h2>All Bills</h2>
            <div id="allBillsList"></div>
        </div>
    </div>

    <script>
        // Check if admin is logged in
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // Backend URL - CHANGE THIS AFTER STARTING YOUR JAVA SERVER
        const API_URL = 'http://localhost:8080';

        // Tab switching
        function showTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            const btns = document.querySelectorAll('.tab-btn');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            btns.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'customers') loadCustomers();
            if (tabName === 'viewBills') loadAllBills();
        }

        // Logout
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'index.html';
        }

        // Add Customer
        document.getElementById('addCustomerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const customer = {
                customerId: document.getElementById('customerId').value,
                name: document.getElementById('customerName').value,
                email: document.getElementById('customerEmail').value,
                address: document.getElementById('customerAddress').value,
                phone: document.getElementById('customerPhone').value
            };

            try {
                const response = await fetch(`${API_URL}/customers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customer)
                });

                if (response.ok) {
                    alert('Customer added successfully!');
                    this.reset();
                    loadCustomers();
                } else {
                    alert('Failed to add customer');
                }
            } catch (error) {
                alert('Error: Make sure Java server is running!');
            }
        });

        // Load Customers
        async function loadCustomers() {
            try {
                const response = await fetch(`${API_URL}/customers`);
                const customers = await response.json();
                
                const html = customers.map(c => `
                    <div class="card">
                        <h3>${c.name}</h3>
                        <p><strong>ID:</strong> ${c.customerId}</p>
                        <p><strong>Email:</strong> ${c.email}</p>
                        <p><strong>Phone:</strong> ${c.phone}</p>
                        <p><strong>Address:</strong> ${c.address}</p>
                        <div class="card-actions">
                            <button onclick="deleteCustomer('${c.customerId}')" class="btn-danger">Delete</button>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('customersList').innerHTML = html || '<p>No customers found</p>';
            } catch (error) {
                document.getElementById('customersList').innerHTML = '<p>Error loading customers. Is server running?</p>';
            }
        }

        // Delete Customer
        async function deleteCustomer(customerId) {
            if (!confirm('Are you sure you want to delete this customer?')) return;
            
            try {
                const response = await fetch(`${API_URL}/customers/${customerId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('Customer deleted successfully!');
                    loadCustomers();
                } else {
                    alert('Failed to delete customer');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Generate Bill
        document.getElementById('generateBillForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const bill = {
                customerId: document.getElementById('billCustomerId').value,
                unitsConsumed: parseFloat(document.getElementById('unitsConsumed').value),
                ratePerUnit: parseFloat(document.getElementById('ratePerUnit').value),
                billMonth: document.getElementById('billMonth').value
            };

            try {
                const response = await fetch(`${API_URL}/bills`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bill)
                });

                if (response.ok) {
                    alert('Bill generated successfully!');
                    this.reset();
                } else {
                    alert('Failed to generate bill. Check if customer ID exists.');
                }
            } catch (error) {
                alert('Error: Make sure Java server is running!');
            }
        });

        // Load All Bills
        async function loadAllBills() {
            try {
                const response = await fetch(`${API_URL}/bills`);
                const bills = await response.json();
                
                const html = bills.map(b => `
                    <div class="card">
                        <h3>Bill #${b.billId}</h3>
                        <p><strong>Customer ID:</strong> ${b.customerId}</p>
                        <p><strong>Month:</strong> ${b.billMonth}</p>
                        <p><strong>Units:</strong> ${b.unitsConsumed}</p>
                        <p><strong>Rate:</strong> ₹${b.ratePerUnit}/unit</p>
                        <p><strong>Amount:</strong> ₹${b.totalAmount.toFixed(2)}</p>
                        <p><strong>Status:</strong> <span class="status-${b.status.toLowerCase()}">${b.status}</span></p>
                    </div>
                `).join('');
                
                document.getElementById('allBillsList').innerHTML = html || '<p>No bills found</p>';
            } catch (error) {
                document.getElementById('allBillsList').innerHTML = '<p>Error loading bills</p>';
            }
        }

        // Load customers on page load
        loadCustomers();
    </script>
</body>
</html>
